<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../style.css">
    <title>Document</title>
</head>

<body>
    <header class="header">
        <div class="logo-header">
            <img src="../src/assets/Drakon.svg" alt="" class="logo-drakon">
        </div>
        <nav class="navBar">
            <a class="link" href="#"><span>Menu</span></a>
            <a class="link" href="#"><span>Sobre nós</span></a>
            <a class="link" href="#"><span>Trabalhos</span></a>
            <a class="link" href="#"><span>Contato</span></a>
        </nav>

        <div class="cta-header">
            <button class="btn btn-header ">
                <span class="text-gradient">Comece Aqui</span>
                <img class="arrow" src="../src/assets/icons/Arrow-red.svg" alt="icon arrow">
            </button>
        </div>

    </header>

    <section class="hero-section">

        <div class="hero-content">
            <div class="text-content">
                <h1 class="titulo-hero"><span class="white-gradient">Criamos soluções web que</span> <span
                        class="text-gradient">automatizam e
                        impulsionam empresas</span></h1>
                <p class="subtitulo-hero">Desenvolvemos sistemas web sob medida,
                    automatizando as operações do seu negócio e
                    tornando seus processos mais rápidos e
                    eficientes.</p>
            </div>
            <div class="buttons-content">
                <button class="btn btn-primary">
                    Falar com a equipe
                    <img src="../src/assets/icons/Arrow.svg" alt="icon arrow">
                </button>
                <button class="btn btn-secondary">
                    <span class="text-gradient">Saiba quem Somos</span>
                    <img src="../src/assets/icons/Arrow-red.svg" alt="icon arrow">
                </button>
            </div>

        </div>
    </section>


</body>

</html>
